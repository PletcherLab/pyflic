name: Daily Docs Update

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC → 1am EST (winter) / 2am EDT (summer)
  workflow_dispatch:      # lets you trigger manually for testing

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0   # need full history for git log

      - name: Collect yesterday's commits on main
        id: commits
        run: |
          SINCE=$(date -u -d 'yesterday 00:00' '+%Y-%m-%dT%H:%M:%SZ')
          UNTIL=$(date -u -d 'today 00:00'      '+%Y-%m-%dT%H:%M:%SZ')
          LOG=$(git log main --since="$SINCE" --until="$UNTIL" \
                        --pretty=format:"- %h %s (%an)")
          if [ -z "$LOG" ]; then
            echo "has_commits=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_commits=true" >> "$GITHUB_OUTPUT"
            echo "since=$SINCE" >> "$GITHUB_OUTPUT"
            echo "until=$UNTIL" >> "$GITHUB_OUTPUT"
            {
              echo "commits<<EOF"
              echo "$LOG"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Nothing to do
        if: steps.commits.outputs.has_commits == 'false'
        run: echo "No commits on main in the last 24h — exiting cleanly."

      - name: Run Claude
        if: steps.commits.outputs.has_commits == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--max-turns 60 --model claude-sonnet-4-6'
          prompt: |
            You are updating this repository's documentation in the "docs" directory based on yesterday's commits to the main branch.

            Time window (UTC): ${{ steps.commits.outputs.since }} to ${{ steps.commits.outputs.until }}
            Branch: main

            Commits in that window:
            ${{ steps.commits.outputs.commits }}

            Your task:
            1. Use `git log` and `git show <sha>` to inspect each commit's actual diff.
            2. Decide which docs are affected — README.md, anything under docs/, API references,
               CHANGELOG.md, inline code comments that are user-facing, etc. Ignore commits that
               are pure internal refactors with no user-visible impact.
            3. Edit the affected docs to reflect the changes. Match the existing tone and structure;
               don't rewrite sections that didn't change.
            4. Add a dated entry to CHANGELOG.md summarizing the day's user-facing changes. If there
               are none, add a brief "Internal changes only" line under today's date.
            5. Create a new branch named `claude/docs-YYYY-MM-DD` (use yesterday's date) based on main.
            6. Commit with message: "docs: auto-update from <YYYY-MM-DD> commits"
            7. Open a pull request into main titled "Daily docs update — <YYYY-MM-DD>" with a short
               bulleted summary of what you changed and why, plus a list of the commit SHAs
               you reviewed.

            If after reviewing you conclude no documentation changes are warranted at all,
            don't open a PR — just print a one-line explanation and exit.